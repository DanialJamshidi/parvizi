<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>۴۰۴ - صفحه پیدا نشد</title>
    <style>
        /* ریست ساده */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b; /* مشکی عمیق */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .error-container {
            background-color: #1a1a1a;   /* مشکی مات‌تر */
            border: 2px solid #b30000;   /* قرمز تند */
            border-radius: 24px;
            padding: 3rem 4rem;
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: #b30000;              /* قرمز */
            text-shadow: 0 0 20px #b3000055, 0 0 40px #b3000022;
            line-height: 1;
            margin-bottom: 0.25rem;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 0.25rem;
            margin-bottom: 1rem;
            border-bottom: 2px dashed #b30000;
            display: inline-block;
            padding-bottom: 0.4rem;
            padding-inline: 0.8rem;
        }

        .error-message {
            font-size: 1.2rem;
            color: #cccccc;
            margin: 1.2rem 0 2rem 0;
            line-height: 1.7;
        }

        .error-message span {
            color: #b30000;
            font-weight: 600;
        }

        .home-link {
            display: inline-block;
            background-color: #b30000;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 0.8rem 2.6rem;
            border-radius: 60px;
            transition: 0.2s;
            border: 1px solid #b30000;
            box-shadow: 0 0 15px #b3000033;
            letter-spacing: 0.5px;
        }

        .home-link:hover {
            background-color: #ffffff;
            color: #b30000;
            border-color: #ffffff;
            box-shadow: 0 0 30px #b3000077;
            transform: scale(1.03);
        }

        /* حالت کوچک‌تر برای موبایل */
        @media (max-width: 480px) {
            .error-container {
                padding: 2rem 1.5rem;
            }
            .error-code {
                font-size: 5.5rem;
            }
            .error-title {
                font-size: 1.8rem;
            }
            .error-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <!-- عدد ۴۰۴ با رنگ قرمز -->
        <div class="error-code">۴۰۴</div>

        <!-- عنوان خطا -->
        <div class="error-title">صفحه پیدا نشد</div>

        <!-- توضیح کوتاه -->
        <p class="error-message">
            متأسفیم، صفحه‌ای که به دنبال آن هستید<br />
            <span>وجود ندارد</span> یا <span>حذف شده</span> است.
        </p>

        <!-- دکمه بازگشت به صفحه اصلی -->
        <a href="https://danialjamshidi.github.io/parvizi" class="home-link">بازگشت به خانه</a>
    </div>
</body>
</html>
